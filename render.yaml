services:
  - type: web
    name: delta-assistant
    runtime: docker
    plan: free
    region: frankfurt
    envVars:
      - key: PORT
        value: 10000
      - key: PYTHONUNBUFFERED
        value: 1
      - key: GEMINI_API_KEY_1
        sync: false
      - key: GEMINI_API_KEY_2
        sync: false
    healthCheckPath: /status
